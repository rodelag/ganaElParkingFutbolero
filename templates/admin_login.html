<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Parkin Futbolero</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        rodelag: '#1B3A5C', 
                        rodelagDark: '#142A45',
                        futbol: '#E31937',
                        gold: '#FFD700'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-rodelag via-rodelagDark to-futbol min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md mx-4">
        <div class="text-center mb-8">
            <img src="{{ url_for('static', filename='images/logo75.png') }}" alt="Rodelag" class="h-16 w-auto mx-auto mb-4 rounded-lg shadow">
            <h1 class="text-2xl font-bold text-gray-900">Panel de Administración</h1>
            <p class="text-gray-500 text-sm mt-1">Gana el Parkin Futbolero</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mb-4 p-3 rounded-lg text-sm {% if category == 'error' %}bg-red-50 text-red-700 border border-red-200{% else %}bg-green-50 text-green-700 border border-green-200{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/admin/login" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Usuario</label>
                <input type="text" name="username" required class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-rodelag focus:border-rodelag outline-none transition" placeholder="admin">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Contraseña</label>
                <input type="password" name="password" required class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-rodelag focus:border-rodelag outline-none transition" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-rodelag hover:bg-rodelagDark text-white font-bold py-3 rounded-xl transition shadow-lg shadow-rodelag/30">
                Iniciar Sesión
            </button>
        </form>
        <div class="mt-6 text-center">
            <a href="/" class="text-sm text-gray-500 hover:text-rodelag transition">&larr; Volver al sitio público</a>
        </div>
    </div>
</body>
</html>
