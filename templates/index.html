{% extends "base.html" %}

{% block content %}
<!-- Hero Banner -->
<div class="relative w-full overflow-hidden bg-rodelag">
    <img src="{{ url_for('static', filename='images/banner-campana-1.jpg') }}" 
         alt="Tómbola Electrónica - Gana el Parkin Futbolero" 
         class="w-full h-auto object-cover object-center max-h-[400px] sm:max-h-[500px]">
</div>

<!-- Info Strip -->
<div class="bg-rodelagDark border-t border-white/10">
    <div class="max-w-7xl mx-auto px-4 py-4">
        <div class="flex flex-wrap justify-center gap-3 text-sm font-semibold text-white">
            <span class="bg-white/10 px-4 py-2 rounded-lg backdrop-blur">Vigencia: 30 Abr - 30 Jun 2026</span>
            <span class="bg-white/10 px-4 py-2 rounded-lg backdrop-blur">1 Boleto por cada B/.100</span>
            <span class="bg-futbol/20 text-white px-4 py-2 rounded-lg backdrop-blur border border-futbol/30">Doble boletos con Crédito de Una</span>
        </div>
    </div>
</div>

<!-- Banners 2 y 3 lado a lado -->
<div class="max-w-7xl mx-auto px-4 pt-12">
    <div class="grid lg:grid-cols-2 gap-8 items-start">
        <!-- Banner 2: Registra tu factura -->
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
            <img src="{{ url_for('static', filename='images/banner-campana-2.jpg') }}" 
                 alt="Participa y registra tu factura aquí" 
                 class="w-full h-auto">
        </div>

        <!-- Banner 3: Premios -->
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
            <img src="{{ url_for('static', filename='images/banner-campana-3.jpg') }}" 
                 alt="Son 6 Ganadores - Premios Parkin Futbolero" 
                 class="w-full h-auto">

        </div>
    </div>
</div>

<!-- Formulario y Consulta -->
<div class="max-w-7xl mx-auto px-4 py-16">
    <div class="grid lg:grid-cols-2 gap-12 items-start">
        <!-- Formulario de Registro -->
        <div>
            <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-100 relative" style="z-index: 10;">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-10 h-10 bg-futbol rounded-full flex items-center justify-center text-white text-lg">⚽</div>
                    <h2 class="text-2xl font-bold text-gray-900">Registra tu Factura</h2>
                </div>
                <p class="text-gray-500 text-sm mb-6">Completa el formulario para acumular boletos electrónicos</p>
                
                <form id="registroForm" class="space-y-5 relative" style="z-index: 20;">
                    <div class="grid sm:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Nombre completo *</label>
                            <input type="text" name="nombre" required class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-rodelag focus:border-rodelag outline-none transition" placeholder="Tu nombre">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Cédula / Pasaporte *</label>
                            <input type="text" name="cedula" required class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-rodelag focus:border-rodelag outline-none transition" placeholder="8-123-4567">
                        </div>
                    </div>
                    
                    <div class="grid sm:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Teléfono *</label>
                            <input type="tel" name="telefono" required class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-rodelag focus:border-rodelag outline-none transition" placeholder="6000-0000">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Correo electrónico *</label>
                            <input type="email" name="email" required class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-rodelag focus:border-rodelag outline-none transition" placeholder="tu@email.com">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Dirección</label>
                        <input type="text" name="direccion" class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-rodelag focus:border-rodelag outline-none transition" placeholder="Tu dirección (opcional)">
                    </div>

                    <hr class="border-gray-200">

                    <div class="grid sm:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Número de Factura *</label>
                            <input type="text" name="numero_factura" required class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-rodelag focus:border-rodelag outline-none transition" placeholder="FAC-000000">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Marca *</label>
                            <select name="marca" required class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-rodelag focus:border-rodelag outline-none transition bg-white">
                                <option value="">Selecciona marca</option>
                                {% for marca in marcas %}
                                <option value="{{ marca }}">{{ marca }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="grid sm:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Monto (antes de ITBMS) *</label>
                            <div class="relative">
                                <span class="absolute left-4 top-2.5 text-gray-500 font-semibold">B/.</span>
                                <input type="number" name="monto" step="0.01" min="100" required class="w-full pl-10 pr-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-rodelag focus:border-rodelag outline-none transition" placeholder="0.00">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Fecha de compra *</label>
                            <input type="date" name="fecha_compra" required class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-rodelag focus:border-rodelag outline-none transition">
                        </div>
                    </div>

                    <div class="grid sm:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Sucursal</label>
                            <input type="text" name="sucursal" class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-rodelag focus:border-rodelag outline-none transition" placeholder="Sucursal Rodelag">
                        </div>
                        <div class="flex items-center">
                            <label class="flex items-center space-x-3 cursor-pointer select-none mt-6">
                                <input type="checkbox" name="credito_una" value="1" class="w-5 h-5 text-rodelag border-gray-300 rounded focus:ring-rodelag">
                                <span class="text-sm font-semibold text-gray-700">Pagado con <span class="text-rodelag font-bold">Crédito de Una</span></span>
                            </label>
                        </div>
                    </div>

                    <button type="submit" id="btnRegistrar" class="w-full bg-rodelag hover:bg-rodelagDark text-white font-bold py-3.5 rounded-xl shadow-lg shadow-rodelag/30 transition transform hover:scale-[1.02] active:scale-[0.98] pulse-button">
                        Registrar Factura
                    </button>
                </form>

                <div id="resultadoRegistro" class="hidden mt-6 p-5 rounded-xl"></div>
            </div>
        </div>

        <!-- Consultar boletos -->
        <div>
            <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-10 h-10 bg-gold rounded-full flex items-center justify-center text-gray-900 text-lg">🏆</div>
                    <h2 class="text-xl font-bold text-gray-900">Consulta tus Boletos</h2>
                </div>
                <div class="flex gap-3">
                    <input type="text" id="consultaCedula" placeholder="Ingresa tu cédula" class="flex-1 px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-futbol focus:border-futbol outline-none transition">
                    <button onclick="consultarBoletos()" class="bg-futbol hover:bg-futbolLight text-white font-bold px-6 py-2.5 rounded-lg transition">
                        Consultar
                    </button>
                </div>
                <div id="resultadoConsulta" class="hidden mt-4"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% endblock %}
